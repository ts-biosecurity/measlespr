<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻しん患者発生 ダッシュボード</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#eef2f7;color:#222;font-size:13px;display:flex;flex-direction:column;}

/* ── header ── */
header{background:linear-gradient(135deg,#1a3a5c 0%,#2c5f8a 100%);color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 6px rgba(0,0,0,.25);flex-shrink:0;}
header h1{font-size:16px;font-weight:700;letter-spacing:.02em;}
header .sub{font-size:11px;opacity:.75;margin-top:3px;}
.period-bar{display:flex;align-items:center;gap:8px;}
.period-bar label{font-size:12px;opacity:.85;}
.pbtn{padding:6px 16px;border:1.5px solid rgba(255,255,255,.45);border-radius:20px;background:transparent;color:#fff;cursor:pointer;font-size:12px;font-family:inherit;transition:all .2s;}
.pbtn.active,.pbtn:hover{background:#e74c3c;border-color:#e74c3c;}

/* ── top section (stats + map/detail) ── */
#top-section{display:flex;flex-direction:column;flex:1 1 0;min-height:200px;overflow:hidden;}

/* ── stats ── */
.stats{display:flex;gap:10px;padding:10px 18px 0;flex-shrink:0;}
.scard{background:#fff;border-radius:8px;padding:10px 18px;box-shadow:0 1px 4px rgba(0,0,0,.08);flex:1;min-width:0;}
.sval{font-size:24px;font-weight:700;line-height:1.1;color:#1a3a5c;}
.sval.red{color:#c0392b;}
.slbl{font-size:11px;color:#888;margin-top:2px;}

/* ── main row (map | resizer | detail) ── */
.main{display:flex;gap:0;padding:10px 18px;flex:1 1 0;min-height:0;}
.card{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:12px;overflow:hidden;display:flex;flex-direction:column;}
.card-title{font-size:13px;font-weight:700;color:#444;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid #eef;flex-shrink:0;}
#pane-map{flex:1 1 0;min-width:200px;}
#pane-detail{flex:0 0 320px;min-width:160px;}

/* ── horizontal (col) resizer ── */
#resizer{width:10px;flex-shrink:0;cursor:col-resize;display:flex;align-items:center;justify-content:center;margin:0 3px;}
#resizer::after{content:'';display:block;width:3px;height:48px;border-radius:2px;background:#c8d4e0;transition:background .2s;}
#resizer:hover::after,#resizer.dragging::after{background:#2c5f8a;}

/* ── vertical (row) resizer ── */
#hresizer{height:10px;flex-shrink:0;cursor:row-resize;display:flex;align-items:center;justify-content:center;margin:0 18px;}
#hresizer::after{content:'';display:block;height:3px;width:60px;border-radius:2px;background:#c8d4e0;transition:background .2s;}
#hresizer:hover::after,#hresizer.dragging::after{background:#2c5f8a;}

/* ── bottom section (table) ── */
#bottom-section{flex:0 0 220px;min-height:80px;display:flex;flex-direction:column;overflow:hidden;padding:0 18px 12px;}
.tcard{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:12px;flex:1;display:flex;flex-direction:column;overflow:hidden;}
.tbl-wrap{overflow:auto;flex:1;min-height:0;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:#f0f5fb;padding:7px 10px;text-align:left;color:#555;font-weight:700;border-bottom:2px solid #dde8f5;position:sticky;top:0;z-index:1;}
td{padding:6px 10px;border-bottom:1px solid #f2f2f2;vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f8fbff;}
td.risk-高{color:#c0392b;font-weight:700;}
td.risk-中{color:#856404;font-weight:700;}
.nodata{text-align:center;color:#bbb;padding:20px;}

/* ── map ── */
#map-wrap{flex:1;position:relative;overflow:hidden;}
#map-wrap svg{width:100%;height:100%;display:block;}
.pref-path{cursor:pointer;}
.pref-path.selected{stroke:#1a3a5c!important;stroke-width:2px!important;}
.map-tip{pointer-events:none;}
.legend{display:flex;gap:10px;align-items:center;margin-top:6px;flex-wrap:wrap;flex-shrink:0;}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:#666;}
.lb{width:14px;height:14px;border-radius:2px;flex-shrink:0;}
.zoom-btns{position:absolute;top:6px;right:6px;display:flex;flex-direction:column;gap:3px;z-index:10;}
.zbtn{width:26px;height:26px;border:1px solid #ccd;border-radius:5px;background:#fff;cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.15);color:#555;font-family:monospace;}
.zbtn:hover{background:#eef2f8;color:#1a3a5c;}

/* ── detail panel ── */
#detail{overflow-y:auto;flex:1;}
#detail-title{font-size:13px;font-weight:700;color:#444;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid #eef;flex-shrink:0;}
.empty-msg{text-align:center;color:#bbb;margin-top:40px;font-size:12px;line-height:1.9;}
.pitem{border:1px solid #ddeeff;border-radius:6px;padding:10px;margin-bottom:9px;background:#fafcff;}
.pitem-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.pdate{font-size:11px;color:#999;}
.rbadge{font-size:11px;padding:2px 9px;border-radius:12px;font-weight:700;white-space:nowrap;}
.r高{background:#fde8e8;color:#c0392b;}
.r中{background:#fef3cd;color:#856404;}
.porg{font-size:11px;color:#555;margin-bottom:5px;}
.psum{font-size:12px;color:#333;line-height:1.6;}
.purl{margin-top:6px;font-size:11px;}
.purl a{color:#2980b9;text-decoration:none;}
.purl a:hover{text-decoration:underline;}
</style>
</head>

<header>

    <h1>🦠 麻しん（はしか）患者発生 ダッシュボード</h1>
    <div class="sub">都道府県別プレスリリース収集状況 / 基準日：2026-03-07</div>
  </div>
  <div class="period-bar">
    <label>表示期間：</label>
    <button class="pbtn active" id="btn3" onclick="setPeriod(3)">発出後3日以内</button>
    <button class="pbtn" id="btn7" onclick="setPeriod(7)">発出後1週間以内</button>
    <button class="pbtn" id="btn30" onclick="setPeriod(30)">発出後1ヶ月以内</button>
    <button class="pbtn" id="btnAll" onclick="setPeriod(0)">2026年</button>
  </div>
</header>

<div id="top-section">
  <div class="stats" id="stats"></div>
  <div class="main">
    <div class="card" id="pane-map">

          <button class="zbtn" onclick="zoomReset()" title="リセット" style="font-size:12px;">⟳</button>
        </div>
      </div>
      <div class="legend" id="legend"></div>
    </div>
    <div id="resizer" title="左右ドラッグでサイズ変更"></div>
    <div class="card" id="pane-detail">
      <div id="detail-title" class="card-title">詳細情報</div>
      <div id="detail">
        <div class="empty-msg">地図上の都道府県をクリックすると<br>プレスリリースの詳細が表示されます</div>
      </div>
    </div>
  </div>
</div>

<div id="hresizer" title="上下ドラッグでサイズ変更"></div>

<div id="bottom-section">
  <div class="tcard">
    <div class="card-title">📋 プレスリリース一覧（フィルター適用中）</div>
    <div class="tbl-wrap">

        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

    "リスク": "中",
    "元情報のURL": "https://www.city.yokohama.lg.jp/kenko-iryo-fukushi/kenko-iryo/hokenjo/oshirase/20260306masin.html"

];

const TODAY = new Date('2026-03-07');

// ── State ─────────────────────────────────────────────────────────────────────
let period = 3;
let selectedPref = null;
let svgEl = null, gEl = null, pathGen = null, zoomBehavior = null;
let allFeatures = [];
let currentZoomTransform = d3.zoomIdentity;

// ── Helpers ───────────────────────────────────────────────────────────────────
// 保健所設置市・政令市 → 都道府県 マッピング
const CITY_TO_PREF = {
  '豊橋市': '愛知県',
  '豊田市': '愛知県',
  '岡崎市': '愛知県',
  '名古屋市': '愛知県',
  '浜松市': '静岡県',
  '静岡市': '静岡県',
  '川崎市': '神奈川県',
  '横浜市': '神奈川県',
  '相模原市': '神奈川県',
  '藤沢市': '神奈川県',
  '横須賀市': '神奈川県',
  '町田市': '東京都',
  '大和高田市': '奈良県',
  '堺市': '大阪府',
  '大阪市': '大阪府',
  '神戸市': '兵庫県',
  '姫路市': '兵庫県',
  '京都市': '京都府',
  '広島市': '広島県',
  'さいたま市': '埼玉県',
  '川口市': '埼玉県',
  '北九州市': '福岡県',
  '福岡市': '福岡県',
  '熊本市': '熊本県',
  '仙台市': '宮城県',
  '札幌市': '北海道',
  '新潟市': '新潟県',
  '金沢市': '石川県',
  '上越市': '新潟県',
  '富山市': '富山県',
  '久留米市': '福岡県',
  '千葉市': '千葉県',
  '吹田市': '大阪府',
  '宇都宮市': '栃木県',
  '船橋市': '千葉県',
};
function prefFromFile(fname) {
  const m = fname.match(/^\d{6}_(.+)\.pdf$/);
  if (!m) return fname;
  const name = m[1];
  return CITY_TO_PREF[name] || name;
}
function filteredData() {
  return ALL_DATA.filter(d => {
    if (period === 0) return new Date(d['発出日']).getFullYear() === 2026;
    const diff = (TODAY - new Date(d['発出日'])) / 86400000;
    return diff >= 0 && diff <= period;
  });
}
function countByPref(data) {
  const c = {};
  data.forEach(d => { const p = prefFromFile(d['ファイル名']); c[p] = (c[p]||0)+1; });
  return c;
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function renderStats(data) {
  const hi = data.filter(d => d['リスク']==='高').length;
  const prefs = new Set(data.map(d => prefFromFile(d['ファイル名']))).size;
  document.getElementById('stats').innerHTML = `
    <div class="scard"><div class="sval">${data.length}</div><div class="slbl">プレスリリース件数</div></div>
    <div class="scard"><div class="sval red">${hi}</div><div class="slbl">リスク「高」件数</div></div>
    <div class="scard"><div class="sval">${prefs}</div><div class="slbl">発生都道府県数</div></div>
    <div class="scard"><div class="sval">${period===3?'3日':period===7?'1週間':period===30?'1ヶ月':'2026年'}</div><div class="slbl">表示期間</div></div>
  `;
}

// ── Table ─────────────────────────────────────────────────────────────────────
function travelHistory(d) {
  if (d['渡航歴']) return d['渡航歴'];
  const t = d['概要'] || '';
  if (/海外渡航歴あり|渡航歴あり/.test(t)) return 'あり';
  if (/渡航歴なし|渡航歴\s*なし/.test(t)) return 'なし';
  return '-';
}

function renderTable(data) {
  const tb = document.getElementById('tbody');
  if (!data.length) {
    tb.innerHTML = '<tr><td colspan="6" class="nodata">該当するデータはありません</td></tr>';
    return;
  }
  tb.innerHTML = data.map(d => {
    const tv = travelHistory(d);
    const tvStyle = tv === 'あり' ? 'color:#c0392b;font-weight:700' : tv === 'なし' ? 'color:#888' : 'color:#ccc';
    return `
    <tr>
      <td style="white-space:nowrap">${d['発出日']}</td>
      <td style="min-width:130px">${d['発出機関']}</td>
      <td>${d['概要']}</td>
      <td style="${tvStyle};white-space:nowrap">${tv}</td>
      <td class="risk-${d['リスク']}">${d['リスク']}</td>
      <td><a href="${d['元情報のURL']}" target="_blank" style="color:#2980b9">🔗 開く</a></td>
    </tr>`;
  }).join('');
}

// ── Detail panel ──────────────────────────────────────────────────────────────
function renderDetail(pref, data) {
  selectedPref = pref;
  document.getElementById('detail-title').textContent = pref ? `📌 ${pref}` : '詳細情報';
  const panel = document.getElementById('detail');
  if (!pref) {
    panel.innerHTML = '<div class="empty-msg">地図上の都道府県をクリックすると<br>プレスリリースの詳細が表示されます</div>';
    return;
  }
  const items = data.filter(d => prefFromFile(d['ファイル名']) === pref);
  if (!items.length) {
    panel.innerHTML = '<div class="empty-msg">選択期間内に発出された<br>プレスリリースはありません</div>';
    return;
  }
  // date and badge on same row — no empty space
  panel.innerHTML = items.map(d => `
    <div class="pitem">
      <div class="pitem-hd">
        <span class="pdate">発出日：${d['発出日']}</span>
        <span class="rbadge r${d['リスク']}">${d['リスク']}</span>
      </div>
      <div class="porg">🏛 ${d['発出機関']}</div>
      <div class="psum">${d['概要']}</div>
      <div class="purl"><a href="${d['元情報のURL']}" target="_blank">🔗 元情報を開く</a></div>
    </div>`).join('');
}

// ── Period switch ─────────────────────────────────────────────────────────────
function setPeriod(days) {
  period = days;
  document.getElementById('btn3').classList.toggle('active', days===3);
  document.getElementById('btn7').classList.toggle('active', days===7);
  document.getElementById('btn30').classList.toggle('active', days===30);
  document.getElementById('btnAll').classList.toggle('active', days===0);
  update();
}

// ── Map ───────────────────────────────────────────────────────────────────────
function prefNameFromFeature(f) {
  const p = f.properties;
  return p.nam_ja || p.nam || p.name || p.NAME_1 || p.prefecture || '';
}

function initMap() {
  const wrap = document.getElementById('map-wrap');
  const W = wrap.clientWidth || 600;
  const H = wrap.clientHeight || 380;

  svgEl = d3.select('#map-wrap').append('svg')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('preserveAspectRatio', 'xMidYMid meet')
    .style('width','100%').style('height','100%');

  const proj = d3.geoMercator()
    .center([136.5, 36.8])
    .scale(W * 1.55)
    .translate([W/2, H/2]);

  pathGen = d3.geoPath().projection(proj);
  gEl = svgEl.append('g');

  // ── Zoom behavior ──
  zoomBehavior = d3.zoom()
    .scaleExtent([0.5, 12])
    .on('zoom', (event) => {
      currentZoomTransform = event.transform;
      gEl.attr('transform', event.transform);
      // Keep stroke width visually constant
      const k = event.transform.k;
      gEl.selectAll('.pref-path')
        .attr('stroke-width', (f => prefNameFromFeature(f) === selectedPref ? 2/k : 0.6/k));
    });

  svgEl.call(zoomBehavior);

  fetch('https://raw.githubusercontent.com/dataofjapan/land/master/japan.topojson')
    .then(r => r.json())
    .then(topo => {
      const key = Object.keys(topo.objects)[0];
      allFeatures = topojson.feature(topo, topo.objects[key]).features;
      drawMap(filteredData());
    })
    .catch(() => {
      svgEl.append('text').attr('x','50%').attr('y','50%')
        .attr('text-anchor','middle').attr('fill','#999').attr('font-size','13px')
        .text('地図データの読み込みに失敗しました（インターネット接続が必要です）');
    });
}

function zoomBy(factor) {
  svgEl.transition().duration(300).call(zoomBehavior.scaleBy, factor);
}
function zoomReset() {
  svgEl.transition().duration(400).call(zoomBehavior.transform, d3.zoomIdentity);
}

function drawMap(data) {
  if (!allFeatures.length) return;
  const counts = countByPref(data);
  const maxC = Math.max(1, ...Object.values(counts));
  const colorScale = d3.scaleSequential()
    .domain([0, maxC])
    .interpolator(t => t===0 ? '#e8ecf1' : d3.interpolateReds(0.2 + t*0.8));

  const k = currentZoomTransform.k;

  gEl.selectAll('*').remove();

  gEl.selectAll('path')
    .data(allFeatures)
    .join('path')
    .attr('class', 'pref-path')
    .attr('d', pathGen)
    .attr('fill', f => colorScale(counts[prefNameFromFeature(f)] || 0))
    .attr('stroke', f => prefNameFromFeature(f)===selectedPref ? '#1a3a5c' : '#fff')
    .attr('stroke-width', f => (prefNameFromFeature(f)===selectedPref ? 2 : 0.6) / k)
    .classed('selected', f => prefNameFromFeature(f)===selectedPref)
    .on('mouseover', function(evt, f) {
      const name = prefNameFromFeature(f);
      const cnt = counts[name] || 0;
      d3.select(this).raise();
      if (!d3.select(this).classed('selected'))
        d3.select(this).attr('stroke','#555').attr('stroke-width', 1.2/currentZoomTransform.k);
      const [mx, my] = d3.pointer(evt, svgEl.node());
      const tw=140, th=30;
      const vb = svgEl.attr('viewBox').split(' ').map(Number);
      const tx = Math.min(mx+10, vb[2]-tw-4);
      const ty = Math.max(my-35, 4);
      const tip = svgEl.append('g').attr('class','map-tip');
      tip.append('rect').attr('x',tx).attr('y',ty).attr('width',tw).attr('height',th)
        .attr('fill','rgba(20,20,20,.8)').attr('rx',4);
      tip.append('text').attr('x',tx+8).attr('y',ty+20)
        .attr('fill','#fff').attr('font-size','12px').attr('font-family','inherit')
        .text(`${name}: ${cnt}件`);
    })
    .on('mouseout', function(evt, f) {
      if (!d3.select(this).classed('selected'))
        d3.select(this).attr('stroke','#fff').attr('stroke-width', 0.6/currentZoomTransform.k);
      svgEl.selectAll('.map-tip').remove();
    })
    .on('click', function(evt, f) {
      if (evt.defaultPrevented) return;  // D3ズームのドラッグ後は無視
      const name = prefNameFromFeature(f);
      selectedPref = (selectedPref===name) ? null : name;
      const kk = currentZoomTransform.k;
      gEl.selectAll('path')
        .classed('selected', ff => prefNameFromFeature(ff)===selectedPref)
        .attr('stroke', ff => prefNameFromFeature(ff)===selectedPref ? '#1a3a5c' : '#fff')
        .attr('stroke-width', ff => (prefNameFromFeature(ff)===selectedPref ? 2 : 0.6)/kk);
      renderDetail(selectedPref, filteredData());
      svgEl.selectAll('.map-tip').remove();
    });

  // Count labels
  Object.entries(counts).forEach(([pref, cnt]) => {
    const feat = allFeatures.find(f => prefNameFromFeature(f)===pref);
    if (!feat) return;
    const c = pathGen.centroid(feat);
    if (!c || isNaN(c[0])) return;
    gEl.append('text')
      .attr('x',c[0]).attr('y',c[1]+4)
      .attr('text-anchor','middle').attr('font-size','9px').attr('font-weight','700')
      .attr('fill','#fff').attr('pointer-events','none').text(cnt);
  });

  // Legend
  document.getElementById('legend').innerHTML = `
    <span style="font-size:11px;color:#777;font-weight:700">件数：</span>
    <div class="li"><div class="lb" style="background:#e8ecf1;border:1px solid #ddd"></div>0件</div>
    <div class="li"><div class="lb" style="background:${colorScale(1)}"></div>1件</div>
    ${maxC>=2?`<div class="li"><div class="lb" style="background:${colorScale(Math.round(maxC/2))}"></div>${Math.round(maxC/2)}件</div>`:''}
    ${maxC>=3?`<div class="li"><div class="lb" style="background:${colorScale(maxC)}"></div>${maxC}件（最大）</div>`:''}
    <span style="font-size:10px;color:#aaa;margin-left:8px">🔍 スクロール／ドラッグで拡大縮小・移動</span>
  `;
}

// ── Full update ───────────────────────────────────────────────────────────────
function update() {
  const data = filteredData().sort((a, b) => (b['発出日'] || '').localeCompare(a['発出日'] || ''));
  renderStats(data);
  renderTable(data);
  drawMap(data);
  renderDetail(selectedPref, data);
}

// ── Horizontal (col) resizer ──────────────────────────────────────────────────
(function() {
  const resizer = document.getElementById('resizer');
  const paneMap = document.getElementById('pane-map');
  const paneDet = document.getElementById('pane-detail');
  let dragging=false, startX=0, startMapW=0, startDetW=0;
  resizer.addEventListener('mousedown', e => {
    dragging=true; startX=e.clientX;
    startMapW=paneMap.getBoundingClientRect().width;
    startDetW=paneDet.getBoundingClientRect().width;
    resizer.classList.add('dragging');
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    paneMap.style.flex = `0 0 ${Math.max(200, startMapW+dx)}px`;
    paneDet.style.flex = `0 0 ${Math.max(160, startDetW-dx)}px`;
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging=false; resizer.classList.remove('dragging');
    document.body.style.cursor=''; document.body.style.userSelect='';
  });
})();

// ── Vertical (row) resizer ────────────────────────────────────────────────────
(function() {
  const hresizer   = document.getElementById('hresizer');
  const topSection = document.getElementById('top-section');
  const botSection = document.getElementById('bottom-section');
  let dragging=false, startY=0, startTopH=0, startBotH=0;
  hresizer.addEventListener('mousedown', e => {
    dragging=true; startY=e.clientY;
    startTopH=topSection.getBoundingClientRect().height;
    startBotH=botSection.getBoundingClientRect().height;
    hresizer.classList.add('dragging');
    document.body.style.cursor='row-resize';
    document.body.style.userSelect='none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dy = e.clientY - startY;
    topSection.style.flex = `0 0 ${Math.max(200, startTopH+dy)}px`;
    botSection.style.flex = `0 0 ${Math.max(80,  startBotH-dy)}px`;
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging=false; hresizer.classList.remove('dragging');
    document.body.style.cursor=''; document.body.style.userSelect='';
  });
})();

// ── Boot ──────────────────────────────────────────────────────────────────────
initMap();
update();
</script>
